<!DOCTYPE html>

body{

pre{

<body>

<h2>📌 Python Program 15</h2>

<pre>
<span class="comment"># Question 15:</span>
<span class="comment"># Print all factors of a number.</span>

<span class="comment"># input lena</span>
n = int(input("Enter a number: "))

<span class="comment"># start 1 se</span>
i = 1

<span class="comment"># 1 se n tak check</span>
while i &lt;= n:
    if n % i == 0:
        print(i, end=" ")   <span class="comment"># factor print</span>
    i += 1
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
Enter a number: 12<br>
1 2 3 4 6 12
</div>

</body>
