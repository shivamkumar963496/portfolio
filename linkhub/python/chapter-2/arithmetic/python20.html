<span class="comment"># Celsius input lo aur Fahrenheit me convert karke print karo</span>

<span class="comment"># user se temperature input le rahe hain</span>

<span class="comment"># conversion formula apply kar rahe hain</span>

<span class="comment"># result print kar rahe hain</span>
print("FAHRENHEIT =", f)
