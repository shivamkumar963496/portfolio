<pre>
<span class="comment"># Question 16:</span>
<span class="comment"># Take a number from the user and check whether it is an integer or decimal</span>

<span class="comment"># Taking number input</span>
num = float(input("ENTER A NUMBER = "))

<span class="comment"># Checking number type</span>

    print("INTEGER NUMBER")
else:
    print("DECIMAL NUMBER")
