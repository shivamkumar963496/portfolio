<body>

<h2>📌 Python Dictionary Program</h2>

<pre>
<span class="comment"># Question:</span>
<span class="comment"># Dictionary se "name" key ki value print karo.</span>

<span class="comment"># dictionary create karna</span>
d = {"name": "Amit", "age": 20}

<span class="comment"># safe access (best practice)</span>
print(d.get("name"))
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
Amit
</div>
