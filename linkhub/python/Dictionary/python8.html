<span class="comment"># Ek Python program likho jo dictionary ki sabhi keys ko list me convert kare.</span>

<span class="comment"># dictionary create karna</span>

<span class="comment"># keys ko list me convert karna</span>
print(list(d.keys()))
</pre>
