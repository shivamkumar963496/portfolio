<h2>📌 Python Program 14</h2>

<pre>
<span class="comment"># Question 14:</span>
<span class="comment"># Find the longest word in a string.</span>

<span class="comment"># input string</span>
s = "my name is shivam kumar and i am a engineering student"

<span class="comment"># split into words</span>
words = s.split()

<span class="comment"># find longest word</span>
longest = max(words, key=len)

<span class="comment"># print result</span>
print(longest)
</pre>

<b>📊 Output:</b><br><br>
engineering
