<h2>📌 Python Program 5</h2>

<pre>
<span class="comment"># Question 5:</span>
<span class="comment"># Take temperature from the user and classify as COLD, WARM, or HOT</span>

<span class="comment"># Taking temperature input</span>
temp = int(input("ENTER TEMPERATURE = "))

<span class="comment"># Checking temperature condition</span>
if temp < 15:
    print("COLD")
elif temp <= 30:
    print("WARM")
else:
    print("HOT")
</pre>
