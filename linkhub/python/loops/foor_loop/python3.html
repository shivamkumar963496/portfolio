<h2>📌 Python Program 3</h2>

<pre>
<span class="comment"># Question 3:</span>
<span class="comment"># Write a Python program to take a number as input</span>
<span class="comment"># and print its multiplication table (1 to 10).</span>

<span class="comment"># user se number input liya ja raha hai</span>
n = int(input("ENTER A NUMBER : "))

<span class="comment"># loop 1 se 10 tak chalega</span>
for i in range(1, 11):
    print(n, "x", i, "=", n*i)
</pre>
