<body>

<h2>📌 Python Program 10</h2>

<pre>
# assignment operators example

a = 10
print("Initial value of a =", a)

a += 5
print("After a += 5, a =", a)

a -= 3
print("After a -= 3, a =", a)

a *= 2
print("After a *= 2, a =", a)

a /= 4
print("After a /= 4, a =", a)

a %= 3
print("After a %= 3, a =", a)
</pre>
