<pre>
<span class="comment"># Question 13:</span>
<span class="comment"># Take a number from the user and check whether it is between 10 and 50</span>

<span class="comment"># Taking number input</span>
num = int(input("ENTER A NUMBER = "))

<span class="comment"># Checking range</span>
if 10 <= num <= 50:
    print("NUMBER IS BETWEEN 10 AND 50")
else:
    print("NUMBER IS NOT BETWEEN 10 AND 50")
