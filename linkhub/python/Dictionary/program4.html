<h2>📌 Python Dictionary Program 4</h2>

<pre>
<span class="comment"># Question 4:</span>
<span class="comment"># Empty dictionary me values add karo</span>

<span class="comment"># empty dictionary banana</span>
d = {}

<span class="comment"># key-value add karna</span>
d["a"] = 1
d["b"] = 2
d["c"] = 3
d["d"] = 4

<span class="comment"># output print karna</span>
print(d)
</pre>

<div class="box">

{'a': 1, 'b': 2, 'c': 3, 'd': 4}
