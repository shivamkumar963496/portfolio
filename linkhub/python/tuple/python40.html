<h2>📌 Python Program 40</h2>

<pre>
<span class="comment"># Question 40:</span>
<span class="comment"># Ek Python program likho jo tuple me se kisi specific element ko remove kare.</span>

<span class="comment"># tuple create karna</span>
t = (1, 2, 3, 4, 2)

<span class="comment"># element (2) remove karna</span>
result = tuple(i for i in t if i != 2)

<span class="comment"># output print karna</span>
print(result)
</pre>

(1, 3, 4)
