<h2>📌 Python Program 23</h2>

<pre>
<span class="comment"># Question 23:</span>
<span class="comment"># Count total number of substrings in a string.</span>

<span class="comment"># input string</span>
s = "abc"

<span class="comment"># length of string</span>
n = len(s)

<span class="comment"># formula to count substrings</span>
print(n * (n + 1) // 2)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
6
