<body>

<h2>📌 Python Dictionary Program 44</h2>

<pre>
<span class="comment"># Question 44:</span>
<span class="comment"># Dictionary me di gayi value ke corresponding key find karo</span>

<span class="comment"># dictionary create karna</span>
d = {"a": 10, "b": 20, "c": 30}

<span class="comment"># value define karna</span>
value = 20

<span class="comment"># key find karna</span>
for k, v in d.items():
    if v == value:
        print(k)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
b
</div>
