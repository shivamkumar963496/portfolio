<h2>📌 Python Program 3</h2>

<pre>
<span class="comment"># Question 3:</span>
<span class="comment"># Count number of vowels in a string.</span>

<span class="comment"># input string</span>
s = "shivam"

<span class="comment"># initialize counter</span>
count = 0

<span class="comment"># loop through string</span>
for ch in s:
    if ch in "aeiouAEIOU":
        count += 1

<span class="comment"># print result</span>
print("vowels is :", count)
</pre>

vowels is : 2
