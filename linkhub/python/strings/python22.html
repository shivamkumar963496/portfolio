<h2>📌 Python Program 22</h2>

<pre>
<span class="comment"># Question 22:</span>
<span class="comment"># Print all substrings of a string.</span>

<span class="comment"># input string</span>
s = "abc"

<span class="comment"># generate substrings</span>
for i in range(len(s)):
    for j in range(i+1, len(s)+1):
        print(s[i:j])
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
a<br>
ab<br>
abc<br>
b<br>
bc<br>
c
