<h2>📌 Python Dictionary Program 40</h2>

<pre>
<span class="comment"># Question 40:</span>
<span class="comment"># List of tuples ko dictionary me convert karo</span>

<span class="comment"># list create karna</span>
lst = [("a", 1), ("b", 2), ("c", 3)]

<span class="comment"># dictionary me convert karna</span>
d = dict(lst)

<span class="comment"># output print karna</span>
print(d)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
{'a': 1, 'b': 2, 'c': 3}
