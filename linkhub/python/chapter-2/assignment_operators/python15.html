<pre>
<span class="comment"># Question 15:</span>
<span class="comment"># User se ek number input lo aur /= operator se usko half karke result print karo</span>

<span class="comment"># user se number input le rahe hain</span>
num = int(input("Enter number: "))

<span class="comment"># number ko half kar rahe hain using /= operator</span>
num /= 2

<span class="comment"># result print kar rahe hain</span>
print(num)
