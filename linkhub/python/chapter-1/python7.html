<h2>📌 Python Program 7</h2>

<pre>
<span class="comment"># Question 7:</span>
<span class="comment"># Do variables ko third variable use kiye bina swap karo</span>

<span class="comment"># initial values assign kar rahe hain</span>
x = 5
y = 10

<span class="comment"># multiple assignment se values swap kar rahe hain</span>
x, y = y, x

<span class="comment"># swapped values print kar rahe hain</span>
print("x =", x)
print("y =", y)
</pre>
