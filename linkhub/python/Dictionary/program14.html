pre{

<body>

<h2>📌 Python Dictionary Program 14</h2>

<pre>
<span class="comment"># Question 14:</span>
<span class="comment"># Do dictionaries ko merge karo</span>

<span class="comment"># dictionary create karna</span>
d1 = {"a":1,"b":2,"c":3}
d2 = {"d":4,"e":5}

<span class="comment"># merge karna</span>
d = {**d1, **d2}

<span class="comment"># output print karna</span>
print(d)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
{'a': 1, 'b': 2, 'c': 3, 'd': 4, 'e': 5}
</div>

</body>
