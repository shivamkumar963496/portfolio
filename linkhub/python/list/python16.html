<h2>📌 Python Program 16</h2>

<pre>
<span class="comment"># Question 16:</span>
<span class="comment"># Flatten a 2D list into 1D list.</span>

matrix = [
[1,2,3,4],
[5,6,7,8]
]

result = []

for i in matrix:
    for j in i:
        result.append(j)

print(result)
</pre>

[1, 2, 3, 4, 5, 6, 7, 8]
