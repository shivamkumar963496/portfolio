<body>

<h2>📌 Python Program 4</h2>

<pre>
<span class="comment"># Question 4:</span>
<span class="comment"># Take a number from the user and classify it as SMALL, MEDIUM, or LARGE</span>

<span class="comment"># Taking number input</span>
num = int(input("ENTER A NUMBER = "))

<span class="comment"># Checking number size</span>
if num < 10:
    print("SMALL")
elif 10 <= num <= 100:
    print("MEDIUM")
else:
    print("LARGE")
</pre>
