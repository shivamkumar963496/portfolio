<h2>📌 Python Set Program 16</h2>

<pre>
<span class="comment"># Question 16:</span>
<span class="comment"># Ek Python program likho jo set me se even elements nikaale using comprehension.</span>

<span class="comment"># set create karna</span>
s = {1, 2, 3, 4, 5, 6}

<span class="comment"># even elements nikalna</span>
even = {i for i in s if i % 2 == 0}

<span class="comment"># output print karna</span>
print(even)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
{2, 4, 6}
