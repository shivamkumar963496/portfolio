<h2>📌 Python Program 17</h2>

<pre>
<span class="comment"># Question 17:</span>
<span class="comment"># List ko reverse karna hai (slicing ka use karke)</span>

<span class="comment"># List create ki</span>
words = ['a','b','c','d','e','f']

<span class="comment"># Slicing se reverse list banayi</span>
print(words[::-1])
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
['f', 'e', 'd', 'c', 'b', 'a']
</div>
