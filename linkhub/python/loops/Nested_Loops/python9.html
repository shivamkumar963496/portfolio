<!DOCTYPE html>
<html>
<head>
<title>Python Program 9</title>
<style>
body{
    background:#020617;
    color:#e5e7eb;
    font-family:monospace;
    padding:20px;
}
pre{
    background:#1e293b;
    padding:15px;
    border-radius:8px;
    overflow-x:auto;
}
.comment{
    color:#22c55e;
}
.box{
    background:#1e293b;

}
</style>

<body>

<h2>📌 Python Program 9</h2>

<pre>
<span class="comment"># Question 9:</span>
<span class="comment"># Demonstrate use of pass statement in loop.</span>

<span class="comment"># loop from 0 to 5</span>
for i in range(6):

    <span class="comment"># when i == 5 do nothing</span>
    if i == 5:
        pass

    <span class="comment"># print value</span>
    print(i)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
0<br>
1<br>
2<br>
3<br>
4<br>
5
</div>

</body>
