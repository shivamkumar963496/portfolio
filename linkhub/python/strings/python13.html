<h2>📌 Python Program 13</h2>

<pre>
<span class="comment"># Question 13:</span>
<span class="comment"># Remove duplicate characters from a string.</span>

<span class="comment"># input string</span>
s = "banana"

<span class="comment"># remove duplicates</span>
result = " "
for ch in s:
    if ch not in result:
        result += ch

<span class="comment"># print result</span>
print(result)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
 bana
</div>
