<h2>📌 Python Program 5</h2>

<pre>
<span class="comment"># Question 5:</span>
<span class="comment"># Write a Python program to take a number as input</span>
<span class="comment"># and print numbers from n to 1 (reverse order).</span>

<span class="comment"># user se number input liya ja raha hai</span>
n = int(input("ENTER A NUMBER : "))

<span class="comment"># loop n se 1 tak reverse chalega</span>
for i in range(n, 0, -1):
    print(i, end=" ")
</pre>
