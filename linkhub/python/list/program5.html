<h2>📌 Python Program 5</h2>

<pre>
<span class="comment"># Question 5:</span>
<span class="comment"># List me sirf odd numbers ka sum nikalna hai</span>

<span class="comment"># List create ki</span>
nums = [2,6,7,8,9,5,4,6,2]

<span class="comment"># Generator expression se odd numbers ka sum nikala</span>
print(sum(i for i in nums if i % 2 != 0))
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
21
