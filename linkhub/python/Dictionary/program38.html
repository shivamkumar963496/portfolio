<h2>📌 Python Dictionary Program 38</h2>

<pre>
<span class="comment"># Question 38:</span>
<span class="comment"># Dictionary me maximum value wali key find karo</span>

<span class="comment"># dictionary create karna</span>
d = {"a": 10, "b": 50, "c": 30}

<span class="comment"># maximum value wali key nikalna</span>
result = max(d, key=d.get)

<span class="comment"># output print karna</span>
print(result)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
b
</div>
