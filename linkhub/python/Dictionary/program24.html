<h2>📌 Python Dictionary Program 24</h2>

<pre>
<span class="comment"># Question 24:</span>
<span class="comment"># Dictionary ki keys ko list me convert karo</span>

<span class="comment"># dictionary create karna</span>
d = {"a": 1, "b": 2, "c": 3}

<span class="comment"># keys ko list me convert karna</span>
key_list = list(d.keys())

<span class="comment"># output print karna</span>
print(key_list)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
['a', 'b', 'c']
