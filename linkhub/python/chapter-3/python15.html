<!DOCTYPE html>

<style>
body{

pre{
    background:#1e293b;

<body>

<h2>📌 Python Program 15</h2>

<pre>
balance = 10000

amount = int(input("ENTER WITHDRAWAL AMOUNT = "))

if amount <= balance:
    print("TRANSACTION SUCCESSFUL")
    print("REMAINING BALANCE = ", balance - amount)

else:
    print("INSUFFICIENT BALANCE")
</pre>
