<body>

<h2>📌 Python Program 6</h2>

<pre>
<span class="comment"># Question 6:</span>
<span class="comment"># Print same number triangle pattern using nested loop.</span>

<span class="comment"># outer loop for rows</span>
for i in range(1,5):

    <span class="comment"># inner loop prints same number</span>
    for j in range(i):
        print(i, end=" ")
        
    <span class="comment"># move to next line</span>
    print()
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
1<br>
2 2<br>
3 3 3<br>
4 4 4 4<br>
</div>

</body>
