<h2>📌 Python Dictionary Program 33</h2>

<pre>
<span class="comment"># Question 33:</span>
<span class="comment"># 1 se 5 tak numbers ka square store karke dictionary banao</span>

<span class="comment"># empty dictionary</span>
dic = {}

<span class="comment"># loop ke through values add karna</span>
for i in range(1, 6):
    dic[i] = i * i

<span class="comment"># output print karna</span>
print(dic)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
{1: 1, 2: 4, 3: 9, 4: 16, 5: 25}
