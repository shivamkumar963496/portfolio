# relational (comparison) operators example

a = 10
b = 5

print("KYA 10 == 5", a == b)
print("KYA 10 != 5", a != b)
print("KYA 10 < 5", a < b)
print("KYA 10 > 5", a > b)
print("KYA 10 >= 5", a >= b)
print("KYA 10 <= 5", a <= b)
