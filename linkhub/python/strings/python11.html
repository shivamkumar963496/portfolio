<h2>📌 Python Program 11</h2>

<pre>
<span class="comment"># Question 11:</span>
<span class="comment"># Reverse the order of words in a string.</span>

<span class="comment"># input string</span>
s = "I Love Python"

<span class="comment"># reverse words</span>
result = " ".join(s.split()[::-1])

<span class="comment"># print result</span>
print(result)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
Python Love I
</div>
