<h2>📌 Python Dictionary Program 27</h2>

<pre>
<span class="comment"># Question 27:</span>
<span class="comment"># Dictionary ki har value me 10 add karke update karo</span>

<span class="comment"># dictionary create karna</span>
d = {"a": 2, "b": 4, "c": 3}

<span class="comment"># loop ke through value me 10 add karna</span>
for k in d:
    d[k] += 10

<span class="comment"># output print karna</span>
print(d)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
{'a': 12, 'b': 14, 'c': 13}
