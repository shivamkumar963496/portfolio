<!DOCTYPE html>

<style>
body{
    background:#020617;

    font-family:monospace;
    padding:20px;
}
pre{
    background:#1e293b;
    padding:15px;

.comment{

<body>

<h2>📌 Python Dictionary Program 10</h2>

<pre>
<span class="comment"># Question 10:</span>
<span class="comment"># Ek Python program likho jo do dictionaries ko merge kare.</span>

<span class="comment"># dictionaries create karna</span>
d1 = {"a": 1}
d2 = {"b": 2}

<span class="comment"># dictionaries merge karna</span>
d = {**d1, **d2}

<span class="comment"># output print karna</span>
print(d)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
{'a': 1, 'b': 2}
</div>

</body>
