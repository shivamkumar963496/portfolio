<h2>📌 Python Program 19</h2>

<pre>
<span class="comment"># Question 19:</span>
<span class="comment"># List ko reverse direction me 2-2 step chod kar print karna hai</span>

<span class="comment"># List create ki</span>
nums = [10,25,5,40,12,36,98,75,45,68,92,91]

<span class="comment"># Slicing me step -2 use kiya</span>
print(nums[::-2])
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
[91, 68, 75, 36, 40, 25]
</div>
