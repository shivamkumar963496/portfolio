<h2>📌 Python Program 25</h2>

<pre>
<span class="comment"># Question 25:</span>
<span class="comment"># Remove all occurrences of a value from list.</span>

nums = [1,2,3,2,4]
target = 2

result = []

for i in nums:
    if i != target:
        result.append(i)

print(result)
</pre>

[1, 3, 4]
