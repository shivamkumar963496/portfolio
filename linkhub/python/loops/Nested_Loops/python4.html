<h2>📌 Python Program 4</h2>

<pre>
<span class="comment"># Question 4:</span>
<span class="comment"># Print numbers from 1 to 5 but stop the loop when the number is 4 using break.</span>

<span class="comment"># loop from 1 to 5</span>
for i in range(1,6):

    <span class="comment"># stop when i becomes 4</span>
    if i == 4:
        break

    print(i)
</pre>

1<br>

3
