<h2>📌 Python Dictionary Program 25</h2>

<pre>
<span class="comment"># Question 25:</span>
<span class="comment"># Dictionary ki values ko list me convert karo</span>

<span class="comment"># dictionary create karna</span>
d = {"a": 1, "b": 2, "c": 3}

<span class="comment"># values ko list me convert karna</span>
value_list = list(d.values())

<span class="comment"># output print karna</span>
print(value_list)
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
[1, 2, 3]
