<span class="comment"># Question 3:</span>
<span class="comment"># Take age from the user and classify as Child, Teen, or Adult</span>

<span class="comment"># Taking age input</span>
age = int(input("ENTER AGE = "))

<span class="comment"># Checking age category</span>

    print("CHILD")
elif age <= 19:
    print("TEEN")
else:
    print("ADULT")
