<h2>📌 Python Dictionary Program 18</h2>

<pre>
<span class="comment"># Question 18:</span>
<span class="comment"># Dictionary ko values ke basis par sort karo</span>

<span class="comment"># dictionary create karna</span>
d = {"a": 3, "b": 1}

<span class="comment"># value ke according sorting karna</span>
print(dict(sorted(d.items(), key=lambda x: x[1])))
</pre>

<div class="box">
<b>📊 Output:</b><br><br>
{'b': 1, 'a': 3}
</div>
